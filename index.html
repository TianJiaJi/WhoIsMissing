<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Who Is Missing - 智能名单比对工具</title>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <style>
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --primary-light: #a5b4fc;
            --secondary: #ec4899;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --danger-light: #fef2f2;
            --bg-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
            --card-bg: rgba(255, 255, 255, 0.95);
            --card-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
            --text-primary: #1e293b;
            --text-secondary: #64748b;
            --border-radius: 20px;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: var(--bg-gradient);
            min-height: 100vh;
            padding: 20px;
            color: var(--text-primary);
            -webkit-font-smoothing: antialiased;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
            padding: 20px;
        }

        .header h1 {
            font-size: clamp(2rem, 5vw, 3rem);
            font-weight: 700;
            margin-bottom: 15px;
            text-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
            letter-spacing: -0.5px;
        }

        .header .subtitle {
            font-size: clamp(0.85rem, 2.5vw, 1rem);
            opacity: 0.95;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            padding: 10px 20px;
            border-radius: 30px;
            display: inline-block;
            border: 1px solid rgba(255, 255, 255, 0.3);
            font-weight: 500;
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border-radius: var(--border-radius);
            box-shadow: var(--card-shadow);
            padding: clamp(20px, 4vw, 35px);
            margin-bottom: 25px;
            border: 1px solid rgba(255, 255, 255, 0.5);
            animation: fadeInUp 0.6s ease;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .upload-section {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 25px;
        }

        @media (max-width: 768px) {
            .upload-section {
                grid-template-columns: 1fr;
                gap: 15px;
            }
        }

        .upload-box {
            border: 2px dashed #cbd5e1;
            border-radius: 16px;
            padding: clamp(20px, 3vw, 30px);
            text-align: center;
            transition: var(--transition);
            cursor: pointer;
            background: linear-gradient(135deg, #f8fafc 0%, #f1f5f9 100%);
            position: relative;
            overflow: hidden;
        }

        .upload-box:hover {
            border-color: var(--primary);
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(99, 102, 241, 0.2);
        }

        .upload-box.drag-over {
            border-color: var(--primary);
            background: linear-gradient(135deg, #ede9fe 0%, #ddd6fe 100%);
            transform: scale(1.02);
        }

        .upload-box.has-file {
            border-color: var(--success);
            border-style: solid;
            background: linear-gradient(135deg, #f0fdf4 0%, #dcfce7 100%);
        }

        .upload-box.has-file::after {
            content: '✓';
            position: absolute;
            top: 10px;
            right: 10px;
            background: var(--success);
            color: white;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 14px;
        }

        .upload-box input { display: none; }

        .upload-box .icon {
            font-size: clamp(2rem, 5vw, 2.5rem);
            margin-bottom: 12px;
        }

        .upload-box .label {
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 8px;
            font-size: clamp(1rem, 2.5vw, 1.1rem);
        }

        .upload-box .sublabel {
            font-size: clamp(0.8rem, 2vw, 0.85rem);
            color: var(--text-secondary);
        }

        .upload-box .filename {
            font-size: 0.85rem;
            color: var(--success);
            margin-top: 10px;
            word-break: break-all;
            font-weight: 500;
        }

        .upload-box .file-stats {
            font-size: 0.75rem;
            color: var(--text-secondary);
            margin-top: 5px;
        }

        .compare-btn {
            width: 100%;
            padding: clamp(14px, 3vw, 18px);
            font-size: clamp(1rem, 2.5vw, 1.15rem);
            font-weight: 600;
            color: white;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: var(--transition);
            box-shadow: 0 8px 25px rgba(99, 102, 241, 0.4);
            position: relative;
            overflow: hidden;
        }

        .compare-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 12px 35px rgba(99, 102, 241, 0.5);
        }

        .compare-btn:disabled {
            background: linear-gradient(135deg, #cbd5e1 0%, #94a3b8 100%);
            cursor: not-allowed;
            box-shadow: none;
            opacity: 0.7;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-bottom: 25px;
        }

        .stat-card {
            text-align: center;
            padding: clamp(15px, 3vw, 20px);
            border-radius: 16px;
            border: 2px solid #e2e8f0;
            transition: var(--transition);
        }

        .stat-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
        }

        .stat-card.primary {
            background: linear-gradient(135deg, #dbeafe 0%, #bfdbfe 100%);
            border-color: #3b82f6;
        }

        .stat-card.success {
            background: linear-gradient(135deg, #d1fae5 0%, #a7f3d0 100%);
            border-color: #10b981;
        }

        .stat-card.warning {
            background: linear-gradient(135deg, #fef3c7 0%, #fde68a 100%);
            border-color: #f59e0b;
        }

        .stat-card .number {
            font-size: clamp(1.8rem, 5vw, 2.5rem);
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 5px;
            line-height: 1;
        }

        .stat-card .label {
            font-size: clamp(0.8rem, 2vw, 0.9rem);
            color: var(--text-secondary);
            font-weight: 500;
        }

        .result-section {
            background: linear-gradient(135deg, #fef2f2 0%, #fee2e2 100%);
            border: 2px solid #fecaca;
            border-radius: 16px;
            padding: clamp(15px, 3vw, 25px);
            max-height: 300px;
            overflow-y: auto;
            margin-bottom: 25px;
        }

        .result-section.all-present {
            background: linear-gradient(135deg, #f0fdf4 0%, #dcfce7 100%);
            border-color: #86efac;
        }

        .result-header {
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 20px;
            font-size: clamp(1rem, 2.5vw, 1.2rem);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .result-header .icon { font-size: 1.5rem; }

        .missing-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 12px;
        }

        @media (max-width: 480px) {
            .missing-list {
                grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
                gap: 8px;
            }
        }

        .missing-person {
            background: white;
            padding: clamp(8px, 2vw, 12px) clamp(10px, 2.5vw, 15px);
            border-radius: 10px;
            text-align: center;
            font-weight: 500;
            color: var(--danger);
            border: 1px solid #fecaca;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
            transition: var(--transition);
            font-size: clamp(0.8rem, 2vw, 0.95rem);
            animation: fadeInUp 0.4s ease backwards;
        }

        .missing-person:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(239, 68, 68, 0.2);
        }

        .all-present-message {
            text-align: center;
            color: var(--success);
            font-size: clamp(1.1rem, 3vw, 1.4rem);
            font-weight: 600;
            padding: clamp(20px, 5vw, 40px);
        }

        .progress-bar {
            width: 100%;
            height: 4px;
            background: #e2e8f0;
            border-radius: 2px;
            overflow: hidden;
            margin: 15px 0;
            display: none;
        }

        .progress-bar.active { display: block; }

        .progress-bar .progress {
            height: 100%;
            background: linear-gradient(90deg, var(--primary) 0%, var(--secondary) 100%);
            border-radius: 2px;
            width: 0%;
            transition: width 0.3s ease;
        }

        .error-toast {
            position: fixed;
            top: 20px;
            right: 20px;
            background: white;
            border: 2px solid var(--danger);
            border-radius: 16px;
            padding: 15px 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
            z-index: 1000;
            display: none;
            animation: slideIn 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            max-width: 350px;
        }

        @media (max-width: 768px) {
            .error-toast {
                top: 10px;
                right: 10px;
                left: 10px;
                max-width: none;
            }
        }

        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        .error-toast.show { display: block; }

        .error-toast .message {
            color: var(--danger);
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .hidden { display: none; }

        .result-section::-webkit-scrollbar { width: 8px; }
        .result-section::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 4px; }
        .result-section::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .result-section::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        .detection-info {
            background: linear-gradient(135deg, #eff6ff 0%, #dbeafe 100%);
            border: 1px solid #93c5fd;
            border-radius: 12px;
            padding: 10px 14px;
            margin-top: 10px;
            font-size: 0.78rem;
            color: #1e40af;
            display: flex;
            flex-direction: column;
            gap: 4px;
            text-align: left;
        }

        .detection-info .info-row {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .detection-info .info-label {
            font-weight: 600;
            min-width: 50px;
        }

        .match-mode {
            background: linear-gradient(135deg, #f0fdf4 0%, #dcfce7 100%);
            border: 1px solid #86efac;
            border-radius: 12px;
            padding: 12px 16px;
            margin-bottom: 20px;
            font-size: 0.9rem;
            color: #166534;
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 500;
        }

        .features {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 15px;
            flex-wrap: wrap;
        }

        .feature-tag {
            background: rgba(255,255,255,0.15);
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            color: white;
            backdrop-filter: blur(5px);
        }

        /* 对比表格样式 */
        .comparison-table-container {
            background: white;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            border: 2px solid #e2e8f0;
        }

        .comparison-header {
            background: linear-gradient(135deg, #6366f1 0%, #4f46e5 100%);
            color: white;
            padding: 20px;
            text-align: center;
        }

        .comparison-header h3 {
            font-size: clamp(1.1rem, 2.5vw, 1.3rem);
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .comparison-table {
            width: 100%;
            border-collapse: collapse;
            font-size: clamp(0.85rem, 2vw, 0.95rem);
        }

        .comparison-table thead {
            background: linear-gradient(135deg, #f8fafc 0%, #f1f5f9 100%);
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .comparison-table th {
            padding: clamp(12px, 2vw, 16px);
            text-align: left;
            font-weight: 600;
            color: var(--text-primary);
            border-bottom: 2px solid #e2e8f0;
            background: linear-gradient(135deg, #f8fafc 0%, #f1f5f9 100%);
        }

        .comparison-table th:first-child {
            width: 50px;
            text-align: center;
        }

        .comparison-table td {
            padding: clamp(10px, 2vw, 14px);
            border-bottom: 1px solid #f1f5f9;
            vertical-align: middle;
        }

        .comparison-table tbody tr {
            transition: var(--transition);
        }

        .comparison-table tbody tr:hover {
            background: #f8fafc;
        }

        .comparison-table tbody tr.missing {
            background: linear-gradient(135deg, #fef2f2 0%, #fee2e2 100%);
        }

        .comparison-table tbody tr.missing:hover {
            background: linear-gradient(135deg, #fee2e2 0%, #fecaca 100%);
        }

        .comparison-table .seq {
            text-align: center;
            color: var(--text-secondary);
            font-weight: 500;
        }

        .comparison-table .name-cell {
            font-weight: 500;
        }

        .comparison-table .id-cell {
            color: var(--text-secondary);
            font-size: 0.85em;
            font-family: 'SF Mono', Monaco, monospace;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
        }

        .status-badge.present {
            background: #d1fae5;
            color: #065f46;
        }

        .status-badge.missing {
            background: #fee2e2;
            color: #991b1b;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        .table-scroll {
            max-height: 600px;
            overflow-y: auto;
        }

        .table-scroll::-webkit-scrollbar { width: 10px; }
        .table-scroll::-webkit-scrollbar-track { background: #f1f5f9; }
        .table-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 5px; }
        .table-scroll::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        .legend {
            display: flex;
            gap: 20px;
            padding: 15px 20px;
            background: #f8fafc;
            border-top: 1px solid #e2e8f0;
            font-size: 0.85rem;
            flex-wrap: wrap;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .legend-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
        }

        .legend-dot.present { background: #10b981; }
        .legend-dot.missing { background: #ef4444; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📋 Who Is Missing</h1>
            <div class="subtitle">🤖 智能表头识别 · 🔢 学号精准匹配 · 📊 直观对比</div>
            <div class="features">
                <span class="feature-tag">自动定位表头行</span>
                <span class="feature-tag">学号优先匹配</span>
                <span class="feature-tag">可视化对比</span>
            </div>
        </div>

        <div class="card">
            <div class="upload-section">
                <div class="upload-box" id="referenceBox" onclick="document.getElementById('referenceFile').click()">
                    <div class="icon">📖</div>
                    <div class="label">参考名单</div>
                    <div class="sublabel">完整名单 · 拖拽或点击上传</div>
                    <div class="filename" id="referenceFilename"></div>
                    <div class="file-stats" id="referenceStats"></div>
                    <div class="detection-info hidden" id="referenceDetection"></div>
                    <input type="file" id="referenceFile" accept=".xlsx,.xls,.csv" onchange="handleFileSelect('reference')">
                </div>

                <div class="upload-box" id="actualBox" onclick="document.getElementById('actualFile').click()">
                    <div class="icon">✅</div>
                    <div class="label">实际名单</div>
                    <div class="sublabel">已到名单 · 拖拽或点击上传</div>
                    <div class="filename" id="actualFilename"></div>
                    <div class="file-stats" id="actualStats"></div>
                    <div class="detection-info hidden" id="actualDetection"></div>
                    <input type="file" id="actualFile" accept=".xlsx,.xls,.csv" onchange="handleFileSelect('actual')">
                </div>
            </div>

            <div class="progress-bar" id="progressBar">
                <div class="progress" id="progress"></div>
            </div>

            <button class="compare-btn" id="compareBtn" onclick="compareLists()" disabled>
                🔍 开始智能比对
            </button>
        </div>

        <div class="card hidden" id="resultCard">
            <div class="match-mode" id="matchMode"></div>
            <div class="stats-grid">
                <div class="stat-card primary">
                    <div class="number" id="totalCount">0</div>
                    <div class="label">总人数</div>
                </div>
                <div class="stat-card success">
                    <div class="number" id="presentCount">0</div>
                    <div class="label">已到人数</div>
                </div>
                <div class="stat-card warning">
                    <div class="number" id="missingCount">0</div>
                    <div class="label">未到人数</div>
                </div>
            </div>

            <div class="result-section" id="resultSection">
                <div class="result-header">
                    <span class="icon">⚠️</span>
                    <span>未到人员名单</span>
                </div>
                <div class="missing-list" id="missingList"></div>
            </div>

            <!-- 对比表格 -->
            <div class="comparison-table-container">
                <div class="comparison-header">
                    <h3>📊 详细对比表</h3>
                </div>
                <div class="table-scroll">
                    <table class="comparison-table">
                        <thead>
                            <tr>
                                <th>序号</th>
                                <th>姓名</th>
                                <th>学号</th>
                                <th>状态</th>
                            </tr>
                        </thead>
                        <tbody id="comparisonTableBody">
                        </tbody>
                    </table>
                </div>
                <div class="legend">
                    <div class="legend-item">
                        <div class="legend-dot present"></div>
                        <span>已到</span>
                    </div>
                    <div class="legend-item">
                        <div class="legend-dot missing"></div>
                        <span>未到（红色高亮）</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="error-toast" id="errorToast">
        <div class="message" id="errorMessage"></div>
    </div>

    <script>
        let referenceData = null;
        let actualData = null;

        class SmartTableAnalyzer {
            constructor() {
                this.headerKeywords = [
                    '姓名', '名字', '名称', 'Name', 'name',
                    '序号', '编号', '学号', '工号', 'ID', 'No',
                    '班级', '部门', '科室', '学院', '院系', '专业', '年级',
                    '状态', '报名状态', '录取状态', '签到', '签退',
                    '时间', '日期', '报名时间', '活动名称',
                    '备注', '留言', '附件', '性别', '年龄',
                    '电话', '手机', '联系方式', '邮箱',
                    '录取方式', '活动ID', '开始', '结束'
                ];

                this.nameKeywords = [
                    '姓名', '名字', '名称', '人名', 'Name', 'name', 'NAME',
                    '参与者', '学员', '学生', '员工', '成员', '人员',
                    '参会者', '嘉宾', '观众', '选手', '队员'
                ];

                this.idKeywords = [
                    '学号', '工号', 'ID', 'id', 'Id', '编号', 'No', 'no',
                    'StudentID', 'Student ID', 'student_id', 'EmpID',
                    '用户ID', '会员编号', '考生号', '准考证号'
                ];

                this.excludeKeywords = [
                    '活动签到表', '签到表', '报名表', '录取列表',
                    '活动名称', '活动时间', '活动地点', '主办方',
                    '活动负责人', '联系电话', '应到人数', '实到人数',
                    '请假', '缺席', '迟到', '早退', '违纪', '违规',
                    '注：', '注:', '说明', '附件', '取消',
                    '允许', '不允许', '代签',
                    '已报名', '已录取', '未录取', '待审核',
                    '德克特', '互联网', '产业学院', '大数据技术',
                    '报名制', '审核制', '暂无附件',
                    '2024', '2025', '2026', '2023'
                ];
            }

            findHeaderRow(jsonData) {
                let bestRow = 0;
                let bestScore = 0;
                const maxRowsToCheck = Math.min(jsonData.length, 25);

                for (let i = 0; i < maxRowsToCheck; i++) {
                    const row = jsonData[i];
                    if (!row || !Array.isArray(row)) continue;

                    let score = 0;
                    for (let j = 0; j < row.length; j++) {
                        const cell = String(row[j] || '').trim();
                        if (cell.length === 0) continue;

                        for (const keyword of this.headerKeywords) {
                            if (cell === keyword) {
                                score += 15;
                            } else if (cell.includes(keyword) && cell.length < keyword.length + 10) {
                                score += 8;
                            }
                        }
                    }

                    if (score > bestScore) {
                        bestScore = score;
                        bestRow = i;
                    }
                }

                return {
                    rowIndex: bestRow,
                    score: bestScore,
                    isReliable: bestScore >= 15
                };
            }

            detectColumns(jsonData, headerRowIndex) {
                const headerRow = jsonData[headerRowIndex] || [];
                const result = {
                    nameColumn: -1,
                    idColumn: -1,
                    nameConfidence: 0,
                    idConfidence: 0,
                    headerPreview: []
                };

                for (let i = 0; i < headerRow.length; i++) {
                    const cell = String(headerRow[i] || '').trim();
                    if (cell.length === 0) continue;

                    result.headerPreview.push({ index: i, value: cell });

                    for (const keyword of this.nameKeywords) {
                        if (cell === keyword || cell.toLowerCase() === keyword.toLowerCase()) {
                            result.nameColumn = i;
                            result.nameConfidence = 100;
                            break;
                        }
                        if (cell.includes(keyword) && result.nameColumn === -1) {
                            result.nameColumn = i;
                            result.nameConfidence = 70;
                        }
                    }

                    for (const keyword of this.idKeywords) {
                        if (cell === keyword || cell.toLowerCase() === keyword.toLowerCase()) {
                            result.idColumn = i;
                            result.idConfidence = 100;
                            break;
                        }
                        if (cell.includes(keyword) && result.idColumn === -1) {
                            result.idColumn = i;
                            result.idConfidence = 70;
                        }
                    }
                }

                if (result.nameColumn === -1) {
                    result.nameColumn = this.inferNameColumnByContent(jsonData, headerRowIndex);
                    result.nameConfidence = 50;
                }

                return result;
            }

            inferNameColumnByContent(jsonData, headerRowIndex) {
                const maxCols = Math.min(jsonData[0]?.length || 0, 10);
                let bestCol = 0;
                let bestScore = -1;

                for (let col = 0; col < maxCols; col++) {
                    let score = 0;
                    let validCount = 0;

                    for (let row = headerRowIndex + 1; row < Math.min(jsonData.length, headerRowIndex + 20); row++) {
                        const cell = String(jsonData[row]?.[col] || '').trim();
                        if (cell.length === 0) continue;

                        validCount++;
                        const nameScore = this.getNameScore(cell);
                        if (nameScore > 20) score += 10;
                    }

                    if (score > bestScore) {
                        bestScore = score;
                        bestCol = col;
                    }
                }

                return bestCol;
            }

            getNameScore(name) {
                if (!name || typeof name !== 'string') return -100;
                
                const trimmed = name.trim();
                if (trimmed.length === 0) return -100;
                if (trimmed.length > 20) return -50;

                let score = 0;

                for (const keyword of this.excludeKeywords) {
                    if (trimmed.includes(keyword)) {
                        score -= 80;
                    }
                }

                if (/^\d+$/.test(trimmed)) return -100;
                if (/^\d{4}[-\/]\d{1,2}[-\/]\d{1,2}/.test(trimmed)) return -100;
                if (/^\d{1,2}[-\/]\d{1,2}[-\/]\d{2,4}/.test(trimmed)) return -100;

                const chineseChars = (trimmed.match(/[\u4e00-\u9fff]/g) || []).length;
                const totalChars = trimmed.length;

                if (chineseChars > 0) {
                    if (chineseChars >= 2 && chineseChars <= 4) score += 70;
                    else if (chineseChars >= 2 && chineseChars <= 6) score += 40;
                    else if (chineseChars === 1) score += 10;

                    if (chineseChars / totalChars > 0.8) score += 20;
                    if (trimmed.includes('·') || trimmed.includes('•')) score += 10;
                } else {
                    if (/^[A-Z][a-z]+/.test(trimmed)) score += 30;
                    if (trimmed.includes(' ')) score += 15;
                }

                for (const keyword of this.headerKeywords) {
                    if (trimmed === keyword) score -= 100;
                }

                return score;
            }

            extractData(jsonData, headerRowIndex, columns) {
                const entries = [];
                const seen = new Set();

                for (let i = headerRowIndex + 1; i < jsonData.length; i++) {
                    const row = jsonData[i];
                    if (!row || !Array.isArray(row)) continue;

                    const name = columns.nameColumn >= 0 && columns.nameColumn < row.length
                        ? String(row[columns.nameColumn] || '').trim()
                        : '';

                    const id = columns.idColumn >= 0 && columns.idColumn < row.length
                        ? String(row[columns.idColumn] || '').trim()
                        : '';

                    if (!name || name.length === 0) continue;
                    if (this.getNameScore(name) < 0) continue;

                    const key = id || name;
                    if (seen.has(key.toLowerCase())) continue;
                    seen.add(key.toLowerCase());

                    entries.push({ name, id });
                }

                return entries;
            }

            analyze(jsonData) {
                const header = this.findHeaderRow(jsonData);
                const columns = this.detectColumns(jsonData, header.rowIndex);
                const data = this.extractData(jsonData, header.rowIndex, columns);

                return {
                    headerRow: header.rowIndex,
                    headerReliable: header.isReliable,
                    nameColumn: columns.nameColumn,
                    idColumn: columns.idColumn,
                    nameConfidence: columns.nameConfidence,
                    idConfidence: columns.idConfidence,
                    data: data,
                    hasId: columns.idColumn >= 0 && data.some(d => d.id && d.id.length > 0),
                    headerPreview: columns.headerPreview
                };
            }
        }

        const analyzer = new SmartTableAnalyzer();

        function setupDragAndDrop() {
            const boxes = document.querySelectorAll('.upload-box');
            boxes.forEach(box => {
                box.addEventListener('dragover', (e) => {
                    e.preventDefault();
                    box.classList.add('drag-over');
                });

                box.addEventListener('dragleave', (e) => {
                    e.preventDefault();
                    if (!box.contains(e.relatedTarget)) {
                        box.classList.remove('drag-over');
                    }
                });

                box.addEventListener('drop', (e) => {
                    e.preventDefault();
                    box.classList.remove('drag-over');
                    
                    const files = e.dataTransfer.files;
                    if (files.length > 0) {
                        const type = box.id.replace('Box', '');
                        const fileInput = document.getElementById(type + 'File');
                        const dt = new DataTransfer();
                        dt.items.add(files[0]);
                        fileInput.files = dt.files;
                        handleFileSelect(type);
                    }
                });
            });
        }

        function handleFileSelect(type) {
            const fileInput = document.getElementById(type + 'File');
            const file = fileInput.files[0];

            if (!file) return;

            const filename = file.name.toLowerCase();
            if (!filename.endsWith('.xlsx') && !filename.endsWith('.xls') && !filename.endsWith('.csv')) {
                showError('请上传 Excel 或 CSV 文件');
                fileInput.value = '';
                return;
            }

            document.getElementById(type + 'Filename').textContent = '📄 ' + file.name;
            document.getElementById(type + 'Box').classList.add('has-file');

            const progressBar = document.getElementById('progressBar');
            const progress = document.getElementById('progress');
            progressBar.classList.add('active');
            progress.style.width = '30%';

            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    progress.style.width = '60%';
                    
                    const data = new Uint8Array(e.target.result);
                    const workbook = XLSX.read(data, { type: 'array' });
                    const firstSheet = workbook.Sheets[workbook.SheetNames[0]];
                    const jsonData = XLSX.utils.sheet_to_json(firstSheet, { header: 1, defval: '' });

                    progress.style.width = '80%';

                    const result = analyzer.analyze(jsonData);

                    progress.style.width = '100%';

                    if (result.data.length === 0) {
                        showError('未找到有效数据，请检查文件格式');
                        setTimeout(() => progressBar.classList.remove('active'), 500);
                        return;
                    }

                    const detectionEl = document.getElementById(type + 'Detection');
                    detectionEl.classList.remove('hidden');
                    
                    let detectionHTML = '';
                    detectionHTML += `<div class="info-row"><span class="info-label">📍 表头行：</span>第 ${result.headerRow + 1} 行</div>`;
                    detectionHTML += `<div class="info-row"><span class="info-label">👤 姓名列：</span>第 ${result.nameColumn + 1} 列 (置信度 ${result.nameConfidence}%)</div>`;
                    
                    if (result.idColumn >= 0) {
                        detectionHTML += `<div class="info-row"><span class="info-label">🔢 学号列：</span>第 ${result.idColumn + 1} 列 ✓</div>`;
                    }
                    
                    detectionHTML += `<div class="info-row"><span class="info-label">📊 数据量：</span>${result.data.length} 条有效记录</div>`;
                    
                    detectionEl.innerHTML = detectionHTML;

                    document.getElementById(type + 'Stats').textContent = 
                        `✓ 识别到 ${result.data.length} 人` + (result.hasId ? '（含学号）' : '');

                    if (type === 'reference') {
                        referenceData = result;
                    } else {
                        actualData = result;
                    }

                    checkCanCompare();
                    setTimeout(() => progressBar.classList.remove('active'), 500);

                } catch (error) {
                    showError('文件解析失败：' + error.message);
                    console.error(error);
                    setTimeout(() => progressBar.classList.remove('active'), 500);
                }
            };

            reader.onerror = () => {
                showError('文件读取失败，请重试');
                setTimeout(() => progressBar.classList.remove('active'), 500);
            };

            reader.readAsArrayBuffer(file);
        }

        function checkCanCompare() {
            document.getElementById('compareBtn').disabled = !(referenceData && actualData);
        }

        function compareLists() {
            if (!referenceData || !actualData) {
                showError('请先上传两个文件');
                return;
            }

            try {
                const useIdMatch = referenceData.hasId && actualData.hasId;
                let comparisonData = [];
                let matchModeText = '';

                if (useIdMatch) {
                    matchModeText = '🎯 匹配方式：学号精准匹配（忽略姓名错别字）';
                    
                    const actualIdMap = new Map();
                    actualData.data.forEach(d => {
                        if (d.id && d.id.length > 0) {
                            actualIdMap.set(d.id.trim().toLowerCase(), d);
                        }
                    });

                    referenceData.data.forEach(d => {
                        const id = d.id ? d.id.trim().toLowerCase() : '';
                        const isPresent = id && actualIdMap.has(id);
                        comparisonData.push({
                            name: d.name,
                            id: d.id,
                            present: isPresent
                        });
                    });
                } else {
                    matchModeText = '📝 匹配方式：姓名模糊匹配';
                    
                    const normalize = (name) => name.trim().toLowerCase().replace(/\s+/g, '');
                    const actualNameSet = new Set(actualData.data.map(d => normalize(d.name)));

                    referenceData.data.forEach(d => {
                        const isPresent = actualNameSet.has(normalize(d.name));
                        comparisonData.push({
                            name: d.name,
                            id: d.id,
                            present: isPresent
                        });
                    });
                }

                const missing = comparisonData.filter(d => !d.present);
                const total = comparisonData.length;
                const present = total - missing.length;

                document.getElementById('totalCount').textContent = total;
                document.getElementById('presentCount').textContent = present;
                document.getElementById('missingCount').textContent = missing.length;
                document.getElementById('matchMode').textContent = matchModeText;

                const resultSection = document.getElementById('resultSection');

                if (missing.length === 0) {
                    resultSection.classList.add('all-present');
                    resultSection.innerHTML = `
                        <div class="all-present-message">
                            🎉 全员到齐！
                        </div>
                    `;
                } else {
                    resultSection.classList.remove('all-present');
                    resultSection.innerHTML = `
                        <div class="result-header">
                            <span class="icon">⚠️</span>
                            <span>未到人员名单 (${missing.length}人)</span>
                        </div>
                        <div class="missing-list" id="missingList"></div>
                    `;

                    const listEl = document.getElementById('missingList');
                    missing.forEach((entry, idx) => {
                        const div = document.createElement('div');
                        div.className = 'missing-person';
                        div.textContent = entry.name;
                        div.title = entry.id ? `学号: ${entry.id}` : '';
                        div.style.animationDelay = `${idx * 0.03}s`;
                        listEl.appendChild(div);
                    });
                }

                // 生成对比表格
                const tableBody = document.getElementById('comparisonTableBody');
                tableBody.innerHTML = '';

                comparisonData.forEach((entry, idx) => {
                    const tr = document.createElement('tr');
                    if (!entry.present) {
                        tr.className = 'missing';
                    }

                    tr.innerHTML = `
                        <td class="seq">${idx + 1}</td>
                        <td class="name-cell">${entry.name}</td>
                        <td class="id-cell">${entry.id || '-'}</td>
                        <td>
                            <span class="status-badge ${entry.present ? 'present' : 'missing'}">
                                ${entry.present ? '✓ 已到' : '✗ 未到'}
                            </span>
                        </td>
                    `;

                    tableBody.appendChild(tr);
                });

                document.getElementById('resultCard').classList.remove('hidden');
                setTimeout(() => {
                    document.getElementById('resultCard').scrollIntoView({ 
                        behavior: 'smooth', 
                        block: 'nearest' 
                    });
                }, 100);

            } catch (error) {
                showError('比对失败：' + error.message);
                console.error(error);
            }
        }

        function showError(message) {
            const toast = document.getElementById('errorToast');
            document.getElementById('errorMessage').textContent = '⚠️ ' + message;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 4000);
        }

        document.addEventListener('DOMContentLoaded', setupDragAndDrop);
    </script>
